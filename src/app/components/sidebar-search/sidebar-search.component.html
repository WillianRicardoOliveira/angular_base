<app-dropdown #dropdown hide-arrow [openOnButtonClick]="false">
  <div slot="button">
    <div class="input-group">
      <input
        class="form-control form-control-sidebar"
        type="text"
        placeholder="Search"
        aria-label="Search"
        [value]="searchText"
        (input)="handleSearchTextChange($event)"
        />
        <div class="input-group-append">
          <button class="btn btn-sidebar" (click)="handleIconClick()">
            <i
                        [ngClass]="{
                            fas: true,
                            'fa-search': searchText.length === 0,
                            'fa-times': searchText.length > 0,
                            'fa-fw': true
                        }"
            ></i>
          </button>
        </div>
      </div>
    </div>
    <div class="menu" slot="menu">
      @if (foundMenuItems.length === 0) {
        <div class="nothing-found">
          No Element found
        </div>
      }

      @if (foundMenuItems.length > 0) {
        <div class="list-group">
          @for (menuItem of foundMenuItems; track menuItem) {
            <a
              [routerLink]="menuItem.path"
              class="list-group-item"
              (click)="handleMenuItemClick()"
              >
              <div
                class="search-title"
                [innerHTML]="boldString(menuItem.name, searchText)"
              ></div>
              <div class="search-path">{{ menuItem.name }}</div>
            </a>
          }
        </div>
      }
    </div>
  </app-dropdown>
