<mat-form-field appearance="outline">
  <mat-select [(value)]="selected" [formControl]="control" (selectionChange)="onMatSelectChange($event)">
    @for (dado of dados; track dado) {
      <mat-option [value]="dado">
        {{ dado.nome }}
      </mat-option>
    }
  </mat-select>
</mat-form-field>
