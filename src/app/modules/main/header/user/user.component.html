<app-dropdown hide-arrow class="user-menu">
    <div slot="button">
        <button type="button" class="nav-link user-toggle" aria-label="Abrir menu do usuario">
            <span class="user-avatar user-avatar--small">
                {{ userInitials }}
            </span>
            <span class="d-none d-md-inline">{{ userName }}</span>
        </button>
    </div>

    <div slot="menu">
        <section class="user-card" aria-label="Menu do usuario">
            <header class="user-card__header">
                <span class="user-avatar user-avatar--large">
                    {{ userInitials }}
                </span>

                <div class="user-card__identity">
                    <strong>{{ userName }}</strong>
                    <span>{{ userEmail }}</span>
                </div>

                <span class="user-card__brand" aria-hidden="true">
                    <i class="fas fa-seedling"></i>
                </span>

                <span class="user-card__lines" aria-hidden="true"></span>
            </header>

            <nav class="user-actions" aria-label="Acoes do usuario">
                <a href="#" class="user-action">
                    <i class="far fa-user" aria-hidden="true"></i>
                    <span>Meu perfil</span>
                    <i class="fas fa-chevron-right" aria-hidden="true"></i>
                </a>

                <a href="#" class="user-action">
                    <i class="fas fa-cog" aria-hidden="true"></i>
                    <span>Configura&ccedil;&otilde;es da conta</span>
                    <i class="fas fa-chevron-right" aria-hidden="true"></i>
                </a>

                <a href="#" class="user-action">
                    <i class="fas fa-sliders-h" aria-hidden="true"></i>
                    <span>Prefer&ecirc;ncias</span>
                    <i class="fas fa-chevron-right" aria-hidden="true"></i>
                </a>

                <button type="button" class="user-action user-action--danger" (click)="logout()">
                    <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
                    <span>Sair do sistema</span>
                </button>
            </nav>
        </section>
    </div>
</app-dropdown>
